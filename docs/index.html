<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSC Hub Modules</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>OSC Hub Modules</h1>
      <p class="subtitle">Установка модулей одной кнопкой. Требуется OSC Hub для Windows.</p>
    </header>
    <div id="catalog" class="grid"></div>
    <p id="fallback" class="fallback" hidden>Не удалось загрузить каталог.</p>
  </main>
  <script>
    function installHref(module) {
      const params = new URLSearchParams({
        url: module.url,
        sha256: module.sha256,
        moduleId: module.id
      });
      return `oschub://module?${params.toString()}`;
    }

    function renderCatalog(data) {
      const root = document.getElementById('catalog');
      const entries = Object.entries(data).map(([id, m]) => ({ id, ...m }));
      entries.sort((a, b) => (a.displayName || a.id).localeCompare(b.displayName || b.id, 'ru'));

      if (!entries.length) {
        document.getElementById('fallback').hidden = false;
        return;
      }

      root.innerHTML = entries.map(m => `
        <article class="card">
          <div class="card-top">
            <h2>${m.displayName || m.id}</h2>
            <span class="version">v${m.version || '?'}</span>
          </div>
          <p class="description">${m.description || ''}</p>
          <div class="actions">
            <a class="btn primary" href="${installHref(m)}">Установить в OSC Hub</a>
            ${m.repo ? `<a class="btn" href="https://github.com/${m.repo}" target="_blank" rel="noopener">GitHub</a>` : ''}
          </div>
        </article>
      `).join('');
    }

    fetch('modules.json')
      .then(r => r.json())
      .then(renderCatalog)
      .catch(() => { document.getElementById('fallback').hidden = false; });
  </script>
</body>
</html>
